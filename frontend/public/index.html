<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Consolata Hostel - Premium Student Accommodation in Nairobi" />
    <title>Consolata Hostel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;0,700;0,900;1,300;1,400;1,700;1,900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['Fraunces', 'serif'],
              body: ['DM Sans', 'sans-serif'],
            },
            colors: {
              brand: '#1a6b3c',
              'brand-light': '#2d8f53',
              'brand-dark': '#134d2b',
              ink: '#0f0f0f',
              parchment: '#f7f4ee',
              stone: '#e8e4db',
            },
          }
        }
      }
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body { font-family: 'DM Sans', sans-serif; background: #f7f4ee; color: #0f0f0f; overflow-x: hidden; }
      .font-display { font-family: 'Fraunces', serif; }

      /* Navbar */
      .nav-scrolled { background: rgba(15,15,15,0.97); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.06); }
      .nav-hero { background: transparent; }

      /* Hero */
      .hero-grad { background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.45) 50%, rgba(0,0,0,0.82) 100%); }

      /* Marquee */
      @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
      .ticker-inner { animation: ticker 28s linear infinite; display: flex; width: max-content; }

      /* Animations */
      @keyframes fadeUp { from { opacity:0; transform:translateY(40px); } to { opacity:1; transform:translateY(0); } }
      @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
      .anim-1 { animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) 0.1s both; }
      .anim-2 { animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) 0.25s both; }
      .anim-3 { animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) 0.4s both; }
      .anim-4 { animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) 0.55s both; }

      /* Scroll reveal */
      .sr { opacity:0; transform:translateY(36px); transition: opacity 0.8s cubic-bezier(.16,1,.3,1), transform 0.8s cubic-bezier(.16,1,.3,1); }
      .sr.show { opacity:1; transform:translateY(0); }
      .sr-delay-1 { transition-delay: 0.1s; }
      .sr-delay-2 { transition-delay: 0.2s; }
      .sr-delay-3 { transition-delay: 0.3s; }
      .sr-delay-4 { transition-delay: 0.4s; }

      /* Buttons */
      .btn-brand { background: #1a6b3c; color: #fff; font-weight: 600; letter-spacing: .02em; transition: all 0.22s ease; }
      .btn-brand:hover { background: #134d2b; transform: translateY(-2px); box-shadow: 0 10px 24px rgba(26,107,60,0.35); }
      .btn-dark { background: #0f0f0f; color: #fff; font-weight: 600; transition: all 0.22s ease; }
      .btn-dark:hover { background: #1a1a1a; transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0,0,0,0.25); }
      .btn-outline { border: 2px solid #0f0f0f; color: #0f0f0f; font-weight: 600; transition: all 0.22s ease; }
      .btn-outline:hover { background: #0f0f0f; color: #fff; transform: translateY(-2px); }
      .btn-outline-white { border: 2px solid rgba(255,255,255,0.6); color: #fff; font-weight: 600; transition: all 0.22s ease; }
      .btn-outline-white:hover { border-color: #fff; background: rgba(255,255,255,0.12); transform: translateY(-2px); }

      /* Cards */
      .room-card { transition: transform 0.4s cubic-bezier(.16,1,.3,1), box-shadow 0.4s ease; overflow: hidden; }
      .room-card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,0.13); }
      .room-card .thumb img { transition: transform 0.65s cubic-bezier(.16,1,.3,1); }
      .room-card:hover .thumb img { transform: scale(1.06); }

      /* Pill tag */
      .pill { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; padding: 5px 14px; border-radius: 999px; }

      /* Section label */
      .sec-label { font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: #1a6b3c; }

      /* Hero carousel dots */
      .hdot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.35); cursor: pointer; transition: all 0.3s; }
      .hdot.on { background: #fff; width: 26px; border-radius: 4px; }

      /* Number callout */
      .big-num { font-family: 'Fraunces', serif; font-size: clamp(3.5rem,8vw,7rem); font-weight: 900; line-height: 1; }

      input:focus, select:focus, textarea:focus { outline: 2px solid #1a6b3c; outline-offset: -1px; border-color: transparent !important; }

      /* Checklist */
      .check-item::before { content: '✓'; color: #1a6b3c; font-weight: 700; margin-right: 10px; }

      /* Horizontal rule accent */
      .rule { width: 44px; height: 3px; background: #1a6b3c; border-radius: 2px; }

      /* Image zoom cover */
      .img-cover { width:100%; height:100%; object-fit:cover; display:block; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
